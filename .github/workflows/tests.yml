name: run tests

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  test_code:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-docker-action@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - run: go mod download

      - run: go test ./...
