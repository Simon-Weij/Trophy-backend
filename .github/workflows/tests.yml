name: run tests

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"

jobs:
  test_code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...
