services:
  app:
    build: .
    ports:
      - 3000:3000
    depends_on:
      db:
        condition: service_healthy
    pull_policy: build
    env_file:
      - .env
    volumes:
      - uploads_data:/var/uploads
    develop:
      watch:
        - action: rebuild
          path: .
  
  db:
    image: postgres:18.3-alpine3.23
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 1s
      timeout: 60s
      retries: 20

  adminer:
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:8080:8080

volumes:
  postgres_data:
  uploads_data: